# Render Blueprint — provisions everything from this one file.
# See https://render.com/docs/blueprint-spec
databases:
  - name: small-lights-db
    databaseName: small_lights
    user: small_lights
    plan: basic-256mb   # $6/month. Free tier expires after 30 days; use 'free' only for testing.
    region: oregon

services:
  - type: web
    name: small-lights
    runtime: node
    plan: free          # $0/month. Sleeps after 15 min of inactivity; upgrade to 'starter' ($7/month) when ready.
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: small-lights-db
          property: connectionString
      - key: NODE_VERSION
        value: 20.11.0
      - key: ANTHROPIC_API_KEY
        sync: false     # Set in Render dashboard
      - key: HASH_SECRET
        generateValue: true  # Render generates a secure random value
      - key: ADMIN_PASSWORD
        sync: false     # Set in Render dashboard
      - key: NEXT_PUBLIC_SITE_URL
        sync: false     # Set in Render dashboard after first deploy
      - key: NEXT_PUBLIC_PLAUSIBLE_DOMAIN
        sync: false     # Optional — leave blank
